x-worldnet-env: &worldnet-env
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://worldnet:worldnet@postgres:5432/worldnet}
  API_ACCESS_KEY: ${API_ACCESS_KEY:-}
  RSSHUB_BASE_URL: ${RSSHUB_BASE_URL:-http://rsshub:1200}
  RSSHUB_ACCESS_KEY: ${RSSHUB_ACCESS_KEY:-}
  RSSHUB_CLS_TELEGRAPH_ENABLED: ${RSSHUB_CLS_TELEGRAPH_ENABLED:-true}
  RSSHUB_CLS_TELEGRAPH_POLL_INTERVAL_MINUTES: ${RSSHUB_CLS_TELEGRAPH_POLL_INTERVAL_MINUTES:-5}
  RSSHUB_CLS_DEPTH_ENABLED: ${RSSHUB_CLS_DEPTH_ENABLED:-true}
  RSSHUB_CLS_DEPTH_POLL_INTERVAL_MINUTES: ${RSSHUB_CLS_DEPTH_POLL_INTERVAL_MINUTES:-30}
  WORLDNEWSAPI_ENABLED: ${WORLDNEWSAPI_ENABLED:-false}
  WORLDNEWSAPI_API_KEY: ${WORLDNEWSAPI_API_KEY:-}
  WORLDNEWSAPI_POLL_INTERVAL_MINUTES: ${WORLDNEWSAPI_POLL_INTERVAL_MINUTES:-30}
  QQ_AGENT_MAIL_TO: ${QQ_AGENT_MAIL_TO:-}
  QQ_AGENT_MAIL_CLI_COMMAND: ${QQ_AGENT_MAIL_CLI_COMMAND:-agently-cli}
  QQ_AGENT_MAIL_TIMEOUT_SECONDS: ${QQ_AGENT_MAIL_TIMEOUT_SECONDS:-30}
  QQ_AGENT_MAIL_AUTHORIZED_EMAIL: ${QQ_AGENT_MAIL_AUTHORIZED_EMAIL:-}
  HOME: /var/lib/worldnet
  XDG_CONFIG_HOME: /var/lib/worldnet/.config
  SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
  SCHEDULER_TICK_SECONDS: ${SCHEDULER_TICK_SECONDS:-5}
  SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-Asia/Shanghai}
  SCHEDULER_TASKS_DEFAULT_DIR: ${SCHEDULER_TASKS_DEFAULT_DIR:-config/tasks/default}
  SCHEDULER_TASKS_CUSTOM_DIR: ${SCHEDULER_TASKS_CUSTOM_DIR:-config/tasks/custom}
  NOTIFICATION_CONFIG_DEFAULT_DIR: ${NOTIFICATION_CONFIG_DEFAULT_DIR:-config/notifications/default}
  NOTIFICATION_CONFIG_CUSTOM_DIR: ${NOTIFICATION_CONFIG_CUSTOM_DIR:-config/notifications/custom}
  HERMES_SEND_COMMAND: ${HERMES_SEND_COMMAND:-/usr/local/bin/worldnet-hermes-send}
  HERMES_BRIDGE_URL: ${HERMES_BRIDGE_URL:-http://host.docker.internal:15307/send}
  HERMES_WEIXIN_TARGET: ${HERMES_WEIXIN_TARGET:-}
  HERMES_SEND_TIMEOUT_SECONDS: ${HERMES_SEND_TIMEOUT_SECONDS:-30}
  LLM_BASE_URL: ${LLM_BASE_URL:-}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_MODEL: ${LLM_MODEL:-}
  LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}

services:
  app:
    build:
      context: .
    image: worldnet:local
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment: *worldnet-env
    depends_on:
      postgres:
        condition: service_healthy
      rsshub:
        condition: service_started
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - agently_credentials:/var/lib/worldnet
    restart: unless-stopped

  scheduler:
    build:
      context: .
    image: worldnet:local
    command: ["python", "scripts/run_scheduler.py"]
    environment: *worldnet-env
    depends_on:
      postgres:
        condition: service_healthy
      rsshub:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - agently_credentials:/var/lib/worldnet
    restart: unless-stopped

  rsshub:
    image: diygod/rsshub:latest
    environment:
      NODE_ENV: production
      LISTEN_INADDR_ANY: 1
      ACCESS_KEY: ${RSSHUB_ACCESS_KEY:-}
    ports:
      - "1200:1200"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-worldnet}
      POSTGRES_USER: ${POSTGRES_USER:-worldnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-worldnet}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  agently_credentials:
  postgres_data:
